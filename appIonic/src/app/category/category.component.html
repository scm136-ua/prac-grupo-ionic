<ion-item>
  <ion-avatar slot="start">
    <img [src]="theCategory.image" />
  </ion-avatar>
  <ion-label>
    <h2>{{ theCategory.name }}</h2>
  </ion-label>
  <ion-button slot="end" fill="clear" (click)="click()">
    <ion-icon name="eye-outline"></ion-icon>
  </ion-button>
</ion-item>

<ion-list *ngIf="selected">
  <ion-item *ngFor="let article of articles">
    <ion-label>{{ article.name }}</ion-label>
  </ion-item>
</ion-list>
